const KEY="dgs_workbook_v1";let 
state=JSON.parse(localStorage.getItem(KEY)||"{}");
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
const el=document.getElementById('chapters');
function render(){el.innerHTML='';CHAPTERS.forEach(ch=>{const 
w=document.createElement('section');w.className='chapter'+(ch.bonus?' 
bonus':'');w.dataset.id=ch.id;const 
h=document.createElement('button');h.className='ch-head';h.innerHTML=`<span 
class="ch-num">${ch.num}</span><span class="ch-title">${ch.title}<span 
class="ch-sub">${ch.sub}</span></span>`;h.onclick=()=>w.classList.toggle('open');const 
b=document.createElement('div');b.className='ch-body';let html='<div 
class="section-eyebrow">Reflect</div>';ch.reflect.forEach(f=>html+=fld(f));html+='<div 
class="section-eyebrow">Build</div>';ch.build.forEach(f=>html+=fld(f));html+='<div 
class="section-eyebrow">Do</div>';ch.tasks.forEach(t=>{const 
c=state[t.id]?'checked':'';html+=`<div class="task"><input type="checkbox" 
id="${t.id}" ${c}><label 
for="${t.id}">${t.t}</label></div>`;});if(ch.quote)html+=`<div 
class="pull">"${ch.quote}"</div>`;b.innerHTML=html;w.append(h,b);el.appendChild(w);});bind();prog();}
function fld(f){const v=state[f.id]||'';return `<div class="field"><label 
class="field-label">${f.label}</label><div 
class="field-hint">${f.hint}</div><textarea 
id="${f.id}">${v}</textarea></div>`;}
function 
bind(){document.querySelectorAll('textarea').forEach(t=>t.oninput=()=>{state[t.id]=t.value;save();});document.querySelectorAll('input[type=checkbox]').forEach(c=>c.onchange=()=>{state[c.id]=c.checked;save();prog();});}
function prog(){const all=CHAPTERS.flatMap(c=>c.tasks.map(t=>t.id));const 
done=all.filter(id=>state[id]).length;document.getElementById('barFill').style.width=(done/all.length*100)+'%';document.getElementById('progressCount').textContent=`${done} 
of ${all.length}`;}
document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset 
everything?')){state={};save();render();}};
render();
</script></body></html>
